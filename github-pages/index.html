<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enable Banking Integration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
      background-color: #46623d;
      color: #fff;
    }
    h1 {
      text-align: center;
    }
    p {
      text-align: center;
    }
    code {
      display: inline-block;
      width: fit-content;
      margin: 10px 0;
      padding: 5px;
      background-color: #f4f4f4;
      color: #333;
      border: 1px solid #5b5b59;
      border-radius: 4px;
    }
    button {
      display: block;
      margin: 0 auto;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Enable Banking Integration</h1>

  <p>You have been redirected here during an authentication process for the Enable Banking integration with the GAS FIRE application.</p>

  <p>Authorization Code <sup>(Copy this)</sup>:</p>
  
  <code id="auth-code"></code>

  <button id="copy-btn" onclick="copyAuthCode()">Copy Authorization Code</button>

  <script>
    // Extract the query parameters from the URL
    const queryParams = new URLSearchParams(window.location.search);
    const code = queryParams.get('code');
    const state = queryParams.get('state');

    if (code && state) {
      // Display the authorization code in the page for the user to copy
      document.getElementById('auth-code').textContent = code;
    } else {
      document.getElementById('auth-code').textContent = 'Authorization code or state not received :(';
      document.getElementById('copy-btn').style.display = 'none';
      console.error('Authorization code or state not found in URL query parameters.');
    }

    function copyAuthCode() {
      const btn = document.getElementById('copy-btn');

      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'Copied to clipboard!';
        setTimeout(() => {
          btn.textContent = 'Copy Authorization Code';
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy authorization code: ', err);
        alert('Failed to copy authorization code. Please try copying it manually.');
      });
    }
  </script>
</body>
</html>
