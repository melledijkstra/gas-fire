name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ################
  # CI pipeline
  ################
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_changed: ${{ steps.check_version.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run linting
        run: pnpm lint
      - name: Run build
        run: pnpm build
      - name: Run unit tests
        run: pnpm test:coverage
      - name: Check version bump and create tag
        id: check_version
        # only run this step for pushes to main, not for pull requests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREVIOUS_VERSION=$(git show HEAD~1:package.json | node -e "const fs = require('fs'); try { console.log(JSON.parse(fs.readFileSync(0, 'utf-8')).version) } catch (e) { console.log('') }")
          else
            PREVIOUS_VERSION=""
          fi

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ] && [ -n "$CURRENT_VERSION" ]; then
            TAG_NAME="v$CURRENT_VERSION"
            echo "Version changed from '$PREVIOUS_VERSION' to '$CURRENT_VERSION'. Creating tag $TAG_NAME..."
            echo "version_changed=true" >> $GITHUB_OUTPUT

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          else
            echo "No version change detected or invalid version."
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi
      # Upload the built dist folder so the deploy job can use it
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: gas-build
          path: dist/
          retention-days: 1
  ################
  # Deploy pipeline
  ################
  deployment:
    needs: build # depends on the build job to complete successfully
    # only run when pushing to main and a new version was detected
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      # we need pnpm to run the switch-env script and clasp commands.
      # however no need to build the application. we already have the build artifact.
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # we retrieve the build artifact from the build job, no need to install dependencies or build again
      # this optimizes the deployment pipeline by reusing the already built code from the CI pipeline
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: gas-build
          path: dist/
      # prepare the clasp configuration with the correct script ID for deployment
      - name: Setup clasp configuration
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          cp .clasp.json.sample .clasp.json
          pnpm switch-env prod ${{ env.SCRIPT_ID }}
          echo '${{ env.CLASPRC_JSON }}' > ~/.clasprc.json
      - name: Deploy to Google Apps Script
        run: pnpm push
      - name: Tag clasp version with app version + commit SHA
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          pnpm exec clasp version "$CURRENT_VERSION-$(git rev-parse --short HEAD)"

