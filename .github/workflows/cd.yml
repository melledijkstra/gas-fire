name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  check-version-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version bump and create tag
        id: check_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREVIOUS_VERSION=$(git show HEAD~1:package.json | node -e "const fs = require('fs'); try { console.log(JSON.parse(fs.readFileSync(0, 'utf-8')).version) } catch (e) { console.log('') }")
          else
            PREVIOUS_VERSION=""
          fi

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ] && [ -n "$CURRENT_VERSION" ]; then
            TAG_NAME="v$CURRENT_VERSION"
            echo "Version changed from '$PREVIOUS_VERSION' to '$CURRENT_VERSION'. Creating tag $TAG_NAME..."
            echo "version_changed=true" >> $GITHUB_OUTPUT

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          else
            echo "No version change detected or invalid version."
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Environment
        if: steps.check_version.outputs.version_changed == 'true'
        uses: ./.github/actions/setup-env

      - name: Run build
        if: steps.check_version.outputs.version_changed == 'true'
        run: pnpm build

      - name: Setup clasp configuration
        if: steps.check_version.outputs.version_changed == 'true'
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          cp .clasp.json.sample .clasp.json
          pnpm switch-env prod ${{ env.SCRIPT_ID }}
          echo '${{ env.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Deploy to Google Apps Script
        if: steps.check_version.outputs.version_changed == 'true'
        run: pnpm push

      - name: Tag clasp version with app version + commit SHA
        if: steps.check_version.outputs.version_changed == 'true'
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          pnpm exec clasp version "$CURRENT_VERSION-$(git rev-parse --short HEAD)"
